  <body>
    <div id="scroll-progress" style="position: fixed; top: 0; left: 0; height: 3px; background: #64ffda; width: 0%; z-index: 1000;"></div>
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a192f; display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 1; transition: opacity 0.5s;">
      <span style="color: #64ffda; font-family: 'Fira Code', monospace; font-size: 32px;">&lt;Marion /&gt;</span>
    </div>
    <div id="root" style="opacity: 0;"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Page loading screen
      setTimeout(() => {
        const loading = document.getElementById('loading-screen');
        const root = document.getElementById('root');
        loading.style.opacity = '0';
        root.style.opacity = '1';
        setTimeout(() => {
          loading.style.display = 'none';
        }, 500);
      }, 1800);

      // Scroll progress bar
      const progressBar = document.getElementById('scroll-progress');
      let ticking = false;

      function updateProgress() {
        const scrollY = window.scrollY;
        const docHeight = document.body.scrollHeight - window.innerHeight;
        const progress = (scrollY / docHeight) * 100;
        progressBar.style.width = progress + '%';
        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateProgress);
          ticking = true;
        }
      });

      // Respect reduced motion
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.querySelectorAll('*').forEach(el => {
          el.style.animation = 'none !important';
          el.style.transition = 'none !important';
        });
      }
    </script>
  </body>
</html>
